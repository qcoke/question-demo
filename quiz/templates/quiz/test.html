<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>20 以内加减法模拟测试</title>
</head>
<body>
  <h1>20 以内加减法模拟测试</h1>
  <p>测试编号：{{ attempt.id }}</p>
  <p>进度：第 {{ order }} / {{ total }} 题（已完成 {{ progress }}%）</p>

  <form method="post">
    {% csrf_token %}
    <hr>
    <p><strong>第 {{ order }} 题：</strong>{{ answer_item.question.stem }}</p>

    <label>
      <input type="radio" name="selected_option" value="A" required>
      A. {{ answer_item.question.option_a }}
    </label><br>
    <label>
      <input type="radio" name="selected_option" value="B">
      B. {{ answer_item.question.option_b }}
    </label><br>
    <label>
      <input type="radio" name="selected_option" value="C">
      C. {{ answer_item.question.option_c }}
    </label><br>
    <label>
      <input type="radio" name="selected_option" value="D">
      D. {{ answer_item.question.option_d }}
    </label><br>

    <br>
    <button type="submit">
      {% if order == total %}
        提交并查看结果
      {% else %}
        下一题
      {% endif %}
    </button>
  </form>
</body>
</html>
