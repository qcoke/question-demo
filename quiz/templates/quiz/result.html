<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>测试结果</title>
</head>
<body>
  <h1>测试结果</h1>
  <p>你的得分：{{ score }} 分</p>
  <p>答对 {{ correct_count }} / {{ total }} 题</p>

  <h2>答题详情</h2>
  {% for item in review_items %}
    <hr>
    <p><strong>题目：</strong>{{ item.question.stem }}</p>
    <p><strong>你的答案：</strong>{{ item.user_answer|default:"未作答" }}</p>
    <p><strong>正确答案：</strong>{{ item.question.correct_option }}</p>
    <p>
      <strong>结果：</strong>
      {% if item.is_correct %}
        正确
      {% else %}
        错误
      {% endif %}
    </p>
  {% endfor %}

  <p><a href="{% url 'start_test' %}">再做一套</a></p>
</body>
</html>
